name: Build Report

# Kiedy się odpala
on:
  push:
    branches: [master]
  workflow_dispatch:  # pozwala na ręczne odpalenie z UI

jobs:
  build:
    name: Compile and generate report
    runs-on: ubuntu-latest  # darmowa maszyna z Ubuntu

    steps:
        # 1. Pobierz kod z repo
      - name: Checkout repository
          uses: actions/checkout@v4

      - name: Create build directories
          run: |
            mkdir -p build
            mkdir -p data
            mkdir -p plot

        # 2. Zainstaluj Pythona
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        # 3. Doinstaluj biblioteki Pythonowe
        - name: Install Python dependencies
          run: |
            python -m pip install --upgrade pip
            pip install matplotlib numpy pandas

        # 4. Zainstaluj LaTeX (texlive)
        - name: Install LaTeX
          run: |
              sudo apt-get update
              sudo apt-get install -y \
              texlive-latex-base \
              texlive-latex-extra \
              texlive-fonts-recommended \
              texlive-lang-polish \
              texlive-science

        # 5. Stwórz brakujące foldery
        - name: Create build directories
          run: |
            mkdir -p build
            mkdir -p data

        # 6. Uruchom skrypt
        - name: Run build script
          run: |
            chmod +x ./run.sh
            ./run.sh

        # 7. Zapisz PDF jako artefakt (do pobrania ze strony Actions)
        - name: Upload PDF report
          uses: actions/upload-artifact@v4
          with:
            name: projekt-raport
            path: projekt_raport.pdf
            retention-days: 30

        # 8. (BONUS) zapisz też wykresy
        - name: Upload generated plots
          uses: actions/upload-artifact@v4
          with:
            name: plots
            path: |
              data/*.csv
              *.png